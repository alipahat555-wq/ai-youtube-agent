name: YouTube Automation Pipeline

on:
  # Run every day at 9 AM UTC
  schedule:
    - cron: '0 9 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: read
    
    steps:
      # Step 1: Clone repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Step 2: Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Step 3: Install system dependencies (FFmpeg, fonts)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            fonts-dejavu \
            fonts-liberation
      
      # Step 4: Install Python dependencies
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 5: Create output directories
      - name: Create directories
        run: |
          mkdir -p output
          mkdir -p logs
      
      # Step 6: Run main pipeline
      - name: Run YouTube automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python main.py
        continue-on-error: true
      
      # Step 7: Upload artifacts (video + logs)
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-automation-output
          path: |
            output/
            logs/
          retention-days: 30
      
      # Step 8: Check if video was created
      - name: Verify pipeline success
        run: |
          if [ ! -f output/video_*.mp4 ]; then
            echo "❌ FAILED: No video created"
            ls -la output/
            tail -100 logs/*.log || echo "No logs found"
            exit 1
          fi
          
          echo "✅ SUCCESS: Video created"
          ls -lh output/
          echo ""
          echo "Video files:"
          ls -1 output/
